name: Update formula

# Keeps Formula/sazare.rb in sync with the latest fhir-sazare release.
# Uses only the repo's own GITHUB_TOKEN (reads the public release, writes here),
# so there is no cross-repo PAT to manage. Run it on demand from the Actions tab
# right after a release, or let the daily schedule pick it up.
on:
  schedule:
    - cron: "23 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync formula to latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPO=fu-foo/fhir-sazare
          TAG=$(gh release view --repo "$REPO" --json tagName -q .tagName)
          VER=${TAG#v}
          CUR=$(grep -oE 'version "[^"]+"' Formula/sazare.rb | head -1 | sed -E 's/version "([^"]+)"/\1/')
          if [ "$VER" = "$CUR" ]; then
            echo "Formula already at $VER — nothing to do."
            exit 0
          fi
          echo "Updating formula $CUR -> $VER"
          python3 - "$REPO" "$CUR" "$VER" <<'PY'
          import sys, re, hashlib, urllib.request
          repo, cur, ver = sys.argv[1], sys.argv[2], sys.argv[3]
          arches = ["macos-arm64", "macos-amd64", "linux-arm64", "linux-amd64"]
          sha = {}
          for a in arches:
              url = f"https://github.com/{repo}/releases/download/v{ver}/sazare-server-{a}.tar.gz"
              sha[a] = hashlib.sha256(urllib.request.urlopen(url).read()).hexdigest()
          path = "Formula/sazare.rb"
          s = open(path).read()
          s = re.sub(r'version "[^"]+"', f'version "{ver}"', s, count=1)
          s = s.replace(f"/download/v{cur}/", f"/download/v{ver}/")
          for a in arches:
              s = re.sub(
                  r'(sazare-server-' + re.escape(a) + r'\.tar\.gz"\s*\n\s*sha256 ")[0-9a-f]{64}(")',
                  lambda m, a=a: m.group(1) + sha[a] + m.group(2),
                  s,
              )
          open(path, "w").write(s)
          print(f"Formula updated to {ver}")
          PY

      - name: Commit if changed
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          VER=$(grep -oE 'version "[^"]+"' Formula/sazare.rb | head -1 | sed -E 's/version "([^"]+)"/\1/')
          git add Formula/sazare.rb
          git commit -m "Update sazare to v$VER"
          git push
